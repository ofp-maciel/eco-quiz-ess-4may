<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoQuiz Pro</title>
    <link rel="stylesheet" href="./quiz.css">
</head>
<body>

<div id="quiz-container">
    <!-- Tela Inicial -->
    <div id="home-screen">
        <h1>EcoQuiz 🌿</h1>
        <p>Desafio de Matemática e Sustentabilidade</p>
        <button class="btn btn-start" onclick="startGame()">Começar Quiz</button>
    </div>

    <!-- Tela do Jogo -->
    <div id="game-screen" class="hidden">
        <div class="placar-container">
            <div class="equipe-box equipe-a">
                <span><b>Equipe A</b>:</span>
                <span class="score" id="scoreA">0</span>
                <div class="controles-pontos">
                    <button class="btn-ponto" onclick="mudarPonto('A', 1)">+1</button>
                    <button class="btn-menos" onclick="mudarPonto('A', -1)">-1</button>
                </div>
            </div>
            <div class="equipe-box equipe-b">
                <span><b>Equipe B</b>:</span>
                <span class="score" id="scoreB">0</span>
                <div class="controles-pontos">
                    <button class="btn-ponto" onclick="mudarPonto('B', 1)">+1</button>
                    <button class="btn-menos" onclick="mudarPonto('B', -1)">-1</button>
                </div>
            </div>
        </div>

        <h2 id="question">Carregando pergunta...</h2>
        <div id="options"></div>

        <button id="btn-revelar" class="btn btn-revelar" onclick="revelarResposta()">Mostrar Resposta</button>

        <div id="feedback">
            <p id="feedback-text"><strong>✅ Resposta correta revelada!</strong></p>
            <p class="eco-tip" id="eco-text"></p>
            <button class="btn btn-start" onclick="nextQuestion()">Próxima Pergunta</button>
        </div>
    </div>
</div>

<!-- Rodapé de Contatos e Botão eCycle -->
<div id="contato-container">
    <div class="contato-info">
        <h3>Contatos de pontos de coleta ♻️</h3>
        <p><strong>Descarte Correto (@descartecorreto):</strong> (92) 98554-4799</p>
        <p><strong>SEMULSP:</strong> (92) 98415-9563 / (92) 98459-5618</p>
    </div>
    
    <div class="contato-botao">
        <a href="https://ecycle.com.br" target="_blank" class="btn-descarte-novo">
            📍 Onde descartar lixo?
        </a>
    </div>
</div>

<script>
    const questionsDB = [
        { 
            q: "Se 1 kg de lixo eletrônico contém cerca de 0,2 g de ouro, quanto podemos recuperar de 15 kg?", 
            options: ["1,5 g", "3,0 g", "5,0 g", "6,0 g"], 
            correct: "3,0 g", 
            eco: "A reciclagem de eletrônicos (mineração urbana) reduz a necessidade de extração de minérios." 
        },
        {
            q: "O que é considerado e-lixo?",
            options: ["Restos de alimentos", "Materiais reciclados comuns", "Equipamentos eletrônicos descartados", "Resíduos orgânicos"],
            correct: "Equipamentos eletrônicos descartados",
            eco: "O e-lixo é uma categoria de resíduos que contém equipamentos eletrônicos e de informática, que precisam ser descartados de forma adequada para evitar impactos ambientais." 
        },
        {
            q: "Por que o descarte incorreto de eletrônicos é um problema ambiental?",
            options: ["Porque ocupa pouco espaço", "Porque libera substâncias tóxicas no ambiente", "Porque não pode ser reciclado", "Porque é barato de descartar"],
            correct: "Porque libera substâncias tóxicas no ambiente",
            eco: "O descarte incorreto de eletrônicos libera substâncias tóxicas no ambiente, prejudicando a saúde pública e o ecossistema." 
        },
        { q: "Como o descarte inadequado de e-lixo afeta a água?",
         options: ["Torna a água mais limpa", "Não afeta a água", "Aumenta o nível dos rios", "Contamina lençóis freáticos e rios"],
           correct: "Contamina lençóis freáticos e rios",
            eco: "Substâncias tóxicas como mercúrio podem vazar para o solo e atingir a água subterrânea."
         },
        { q: "Quais são os riscos à saúde humana causados pelo contato com lixo eletrônico?",
          options: ["Nenhum risco", "Apenas alergias leves", "Doenças graves e intoxicação", "Melhora da saúde"],
          correct: "Doenças graves e intoxicação",
          eco: "Metais pesados no e-lixo podem causar danos neurológicos e renais graves." },
        { q: "Quais materiais podem ser reaproveitados de aparelhos eletrônicos?",
          options: ["Apenas plástico", "Apenas vidro", "Apenas papel", "Metais, plásticos e vidro"],
          correct: "Metais, plásticos e vidro",
          eco: "Quase todos os componentes de um eletrônico podem ser reciclados se descartados corretamente."
        },
        { q: "Quem é responsável pelo descarte correto dos eletrônicos?",
          options: ["Apenas o governo", "Apenas as empresas", "Apenas o consumidor", "Todos (consumidor, empresas e governo)"],
          correct: "Todos (consumidor, empresas e governo)",
          eco: "A logística reversa depende da colaboração de todos os setores da sociedade."
        },
        { q: "Quais atitudes individuais podem ajudar a diminuir o problema do lixo eletrônico?",
          options: ["Comprar mais eletrônicos", "Jogar tudo no lixo comum", "Ignorar o problema", "Reduzir, reutilizar e reciclar corretamente"],
          correct: "Reduzir, reutilizar e reciclar corretamente",
          eco: "Pequenas mudanças no consumo reduzem toneladas de resíduos anualmente."
        },
        {
            q: "Quais substâncias tóxicas podem ser encontradas em equipamentos eletrônicos?",
            options: ["Água e sal", "Oxigênio e hidrogênio", "Chumbo, mercúrio e cádmio", "Areia e argila"],
            correct: "Chumbo, mercúrio e cádmio",
            eco: "Equipamentos eletrônicos podem conter substâncias tóxicas como chumbo, mercúrio e cádmio, que são prejudiciais ao meio ambiente e à saúde humana."
        },
        { 
            q: "Uma lâmpada incandescente consome 60W e uma de LED consome 10W. Trocando 5 lâmpadas, quanto economizamos?", 
            options: ["150 W", "200 W", "250 W", "300 W"], 
            correct: "250 W", 
            eco: "A eficiência energética é um dos pilares da engenharia sustentável, reduzindo a pressão nas hidrelétricas." 
        },
        { 
            q: "O descarte de 1L de óleo contamina 25.000L de água. Se descartarmos 4 litros incorretamente, qual o volume poluído?", 
            options: ["50.000 L", "75.000 L", "100.000 L", "125.000 L"], 
            correct: "100.000 L", 
            eco: "Nunca jogue óleo na pia! Ele pode ser reciclado e transformado em biocombustível ou sabão ecológico." 
        },
        {
            q: "O que pode acontecer se o lixo eletrônico for jogado em lixões comuns?",
            options: ["Ele desaparece rapidamente", "Vira adubo", "Libera substâncias tóxicas no solo e na água", "Não causa nenhum impacto"],
            correct: "Libera substâncias tóxicas no solo e na água",
            eco: "O lixo eletrônico contém substâncias tóxicas que podem contaminar o solo e a água, prejudicando a saúde humana e o meio ambiente."
        },
        { 
            q: "Um smartphone consome 40 kg de recursos naturais. Reciclando metais de 3 celulares, quanto evitamos extrair?", 
            options: ["80 kg", "100 kg", "120 kg", "140 kg"], 
            correct: "120 kg", 
            eco: "A economia circular é fundamental para a sustentabilidade industrial e preservação de reservas minerais." 
        },
        {
            q: "Quanto tempo, em média, um aparelho eletrônico leva para se decompor na natureza?",
            options: ["Alguns dias", "Alguns meses", "Algumas semanas", "Centenas de anos"],
            correct: "Centenas de anos",
            eco: "A decomposição de equipamentos eletrônicos leva centenas de anos, destacando a importância do descarte adequado."
        },
        {
            q: "Qual é a relação entre lixo eletrônico e contaminação do solo?",
            options: ["Nenhuma relação", "Ajuda a fertilizar o solo", "Libera substâncias tóxicas que contaminam o solo", "Deixa o solo mais seco"],
            correct: "Libera substâncias tóxicas que contaminam o solo",
            eco: "O lixo eletrônico contém substâncias tóxicas que podem contaminar o solo e a água, prejudicando a saúde humana e o meio ambiente."
        },
        { 
            q: "Produzir 1t de papel novo corta 12 árvores. Se uma escola usa 3t de papel reciclado, quantas árvores são poupadas?", 
            options: ["18 árvores", "24 árvores", "36 árvores", "42 árvores"], 
            correct: "36 árvores", 
            eco: "Adotar processos digitais e papel reciclado protege nossas florestas e a biodiversidade." 
        },
        { 
            q: "Segundo dados de 2025, em quanto o Brasil reduziu suas perdas florestais?", 
            options: ["15%", "30%", "42%", "55%"], 
            correct: "42%", 
            eco: "O Brasil reduziu em 42% as perdas florestais em 2025, um marco importante." 
        },
        { 
            q: "Quantos quilos de moedas foram retirados das Cataratas do Iguaçu recentemente?", 
            options: ["150 kg", "225 kg", "383 kg", "410 kg"], 
            correct: "383 kg", 
            eco: "O descarte de moedas polui a água e prejudica seriamente a fauna local." 
        }
    ];

    let currentQuestions = [];
    let currentQIndex = 0;
    let pontosA = 0;
    let pontosB = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startGame() {
        currentQuestions = shuffle([...questionsDB]); 
        currentQIndex = 0;
        document.getElementById("home-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");
        loadQuestion();
    }

    function loadQuestion() {
        const qData = currentQuestions[currentQIndex];
        document.getElementById("question").innerText = (currentQIndex + 1) + ". " + qData.q;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        document.getElementById("feedback").style.display = "none";
        document.getElementById("btn-revelar").style.display = "block";

        const shuffledOptions = shuffle([...qData.options]);
        const letras = ["A", "B", "C", "D"];

        shuffledOptions.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.innerText = letras[i] + ") " + opt;
            btn.className = "btn btn-option";
            if (opt === qData.correct) { btn.id = "correta-btn"; }
            btn.disabled = true; 
            optionsDiv.appendChild(btn);
        });
    }

    function revelarResposta() {
        const correta = document.getElementById("correta-btn");
        if(correta) correta.classList.add("correta");
        document.getElementById("feedback").style.display = "block";
        document.getElementById("eco-text").innerText = "Dica: " + currentQuestions[currentQIndex].eco;
        document.getElementById("btn-revelar").style.display = "none";
    }

    function mudarPonto(equipe, valor) {
        if(equipe === 'A') {
            pontosA = Math.max(0, pontosA + valor);
            document.getElementById('scoreA').innerText = pontosA;
        } else {
            pontosB = Math.max(0, pontosB + valor);
            document.getElementById('scoreB').innerText = pontosB;
        }
    }

    function nextQuestion() {
        currentQIndex++;
        if(currentQIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            let res = pontosA > pontosB ? "Vitória da Equipe A!" : (pontosB > pontosA ? "Vitória da Equipe B!" : "Empate!");
            document.getElementById("game-screen").innerHTML = `
                <h2>Fim do Jogo!</h2>
                <div class='placar-container'>
                    <div class='equipe-box'>A: ${pontosA}</div>
                    <div class='equipe-box'>B: ${pontosB}</div>
                </div>
                <h3>${res}</h3>
                <button class="btn btn-start" onclick="location.reload()">Jogar Novamente</button>
            `;
        }
    }
</script>
</body>
</html>
